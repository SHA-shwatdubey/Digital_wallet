services:
  postgres:
    image: postgres:18
    container_name: wallet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: root
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./docker/init/01-create-databases.sql:/docker-entrypoint-initdb.d/01-create-databases.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: wallet-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    restart: unless-stopped
    environment:
      GIT_URI: https://github.com/SHA-shwatdubey/Digital_wallet.git
    ports:
      - "8060:8060"
    depends_on:
      - postgres
      - rabbitmq

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8060?fail-fast=true&max-attempts=30&initial-interval=1000&max-interval=3000&multiplier=1.2"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8061:8061"
    depends_on:
      - config-server

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8060?fail-fast=true&max-attempts=30&initial-interval=1000&max-interval=3000&multiplier=1.2"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8062:8062"
    depends_on:
      - eureka-server

  auth-service:
    build:
      context: ./auth-service
      dockerfile: Dockerfile
    container_name: auth-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8060?fail-fast=true&max-attempts=30&initial-interval=1000&max-interval=3000&multiplier=1.2"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8063:8063"
    depends_on:
      - postgres
      - eureka-server

  user-kyc-service:
    build:
      context: ./user-kyc-service
      dockerfile: Dockerfile
    container_name: user-kyc-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8060?fail-fast=true&max-attempts=30&initial-interval=1000&max-interval=3000&multiplier=1.2"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8064:8064"
    depends_on:
      - postgres
      - eureka-server

  wallet-service:
    build:
      context: ./wallet-service
      dockerfile: Dockerfile
    container_name: wallet-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8060?fail-fast=true&max-attempts=30&initial-interval=1000&max-interval=3000&multiplier=1.2"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8065:8065"
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server

  rewards-service:
    build:
      context: ./rewards-service
      dockerfile: Dockerfile
    container_name: rewards-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8060?fail-fast=true&max-attempts=30&initial-interval=1000&max-interval=3000&multiplier=1.2"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8066:8066"
    depends_on:
      - postgres
      - rabbitmq
      - eureka-server

  transaction-service:
    build:
      context: ./transaction-service
      dockerfile: Dockerfile
    container_name: transaction-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8060?fail-fast=true&max-attempts=30&initial-interval=1000&max-interval=3000&multiplier=1.2"
      SPRING_PROFILES_ACTIVE: docker
      SERVER_PORT: 8068
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/transaction_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: root
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
    ports:
      - "8068:8068"
    depends_on:
      - postgres
      - eureka-server

  admin-service:
    build:
      context: ./admin-service
      dockerfile: Dockerfile
    container_name: admin-service
    restart: unless-stopped
    environment:
      SPRING_CONFIG_IMPORT: "configserver:http://config-server:8060?fail-fast=true&max-attempts=30&initial-interval=1000&max-interval=3000&multiplier=1.2"
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8067:8067"
    depends_on:
      - postgres
      - eureka-server

volumes:
  postgres_data:
